services:
  db:
    image: postgres:16-alpine
    container_name: inventory_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inventory} -d ${POSTGRES_DB:-inventory}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Exposed only for local debugging; not required by other services.
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: inventory_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-inventory}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inventory}
      POSTGRES_DB: ${POSTGRES_DB:-inventory}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      LOW_STOCK_THRESHOLD: ${LOW_STOCK_THRESHOLD:-10}
      SEED_ON_STARTUP: ${SEED_ON_STARTUP:-true}
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me-in-production}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin: nginx proxies /api to the backend service.
        VITE_API_BASE_URL: /api
    container_name: inventory_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  pgdata:
    name: inventory_pgdata
